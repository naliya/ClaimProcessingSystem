spring:
  application:
    name: ClaimProcessingSystem
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/claimdb}
    username: ${DB_USERNAME:claim_user}
    password: ${DB_PASSWORD:claim_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    jwt-secret: ${JWT_SECRET:please-change-this-secret-key-to-at-least-32-bytes}
    jwt-issuer: ${JWT_ISSUER:claim-processing-system}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    users:
      - username: ${APP_USER:appuser}
        password: ${APP_PASSWORD:apppassword}
  worker:
    claim-processing-delay-ms: ${CLAIM_WORKER_DELAY_MS:60000}

logging:
  level:
    org.springframework.security: INFO
